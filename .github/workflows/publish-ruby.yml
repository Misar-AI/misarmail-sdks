name: Publish Ruby SDK
on:
  push:
    tags: ['ruby/v*']
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: ruby
      - run: bundle exec rspec
        working-directory: ruby
      - run: gem build *.gemspec
        working-directory: ruby
      - run: gem push *.gem
        working-directory: ruby
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
