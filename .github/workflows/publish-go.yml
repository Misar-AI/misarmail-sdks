name: Publish Go SDK

on:
  push:
    tags: ["go/v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go build ./...
      - run: go test ./...
      # Go modules are served by proxy.golang.org automatically on tag push.
      # No upload step needed — the tag triggers discovery.
