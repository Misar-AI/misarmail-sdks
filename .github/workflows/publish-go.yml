name: Publish Go SDK

on:
  push:
    tags: ["go/v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
      - run: go test ./...
        working-directory: go
      - name: Verify tag format for pkg.go.dev
        run: echo "Published at $GITHUB_REF_NAME — pkg.go.dev indexes automatically within ~30 min"
