name: Publish C SDK

on:
  push:
    tags: ["c/v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev cmake
      - name: Build
        working-directory: c
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
          tar czf misarmail-c-linux-amd64.tar.gz misarmail*
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "C SDK ${{ github.ref_name }}"
          files: c/build/misarmail-c-linux-amd64.tar.gz
          generate_release_notes: true
