name: Publish Swift SDK

on:
  push:
    tags: ["swift/v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: swift build -c release
        working-directory: swift
      - run: swift test
        working-directory: swift
      - name: Notify Swift Package Index
        run: |
          curl -sf "https://swiftpackageindex.com/api/packages/Misar-AI/misarmail-sdks/trigger-builds" \
            -H "Authorization: Bearer $SPI_TOKEN" || echo "SPI webhook optional"
        env:
          SPI_TOKEN: ${{ secrets.SPI_TOKEN }}
        continue-on-error: true
